const COMMENTS_KEY = "hopegoo-geo-comments";

// Storage: uses Firebase if configured, otherwise localStorage
const FIREBASE_CONFIGURED = typeof window._fbDb !== 'undefined';

async function loadState(key, fallback) {
  try {
    if (FIREBASE_CONFIGURED) {
      const snap = await window._fbDb.ref('geo/' + key).once('value');
      const val = snap.val();
      return val ? JSON.parse(val) : fallback;
    }
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch(e) {
    console.error('Load failed:', e);
    return fallback;
  }
}

async function saveState(key, data) {
  try {
    const json = JSON.stringify(data);
    if (FIREBASE_CONFIGURED) {
      await window._fbDb.ref('geo/' + key).set(json);
    }
    localStorage.setItem(key, json);
  } catch(e) {
    console.error('Save failed:', e);
  }
}

  const [showContentBox, setShowContentBox] = useState(false);
  const claim = claims[task.id];
  const taskComments = comments.filter(c => c.taskId === task.id);
  const isClaimed = !!claim;
  const isClaimedByMe = claim?.user === userName;

  return (
    <div style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${isClaimed ? pillarAccent + "40" : "rgba(255,255,255,0.06)"}`, borderRadius:16, marginBottom:12, overflow:"hidden", transition:"all 0.3s" }}>
      <div
        onClick={() => setExpanded(!expanded)}
        style={{ padding:"16px 20px", cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}
      >
        <div style={{ width:8, height:8, borderRadius:"50%", background: isClaimed ? pillarAccent : "rgba(255,255,255,0.2)", flexShrink:0 }} />
        <div style={{ flex:1 }}>
          <div style={{ fontSize:15, fontWeight:600, color:"#fff" }}>{task.title}</div>
          {isClaimed && (
            <div style={{ fontSize:12, color: pillarAccent, marginTop:4, display:"flex", alignItems:"center", gap:4 }}>
              <span>👤</span> {claim.user} 已领取 · {new Date(claim.time).toLocaleDateString("zh-CN")}

          )}

        <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", transform: expanded ? "rotate(180deg)" : "rotate(0)", transition:"transform 0.3s" }}>▼</div>
      </div>

      {expanded && (
        <div style={{ padding:"0 20px 20px", borderTop:"1px solid rgba(255,255,255,0.05)" }}>
          <div style={{ paddingTop:16, fontSize:14, color:"rgba(255,255,255,0.7)", lineHeight:1.8, whiteSpace:"pre-wrap" }}>

              {taskComments.filter(c => c.type === "content").map((c, i) => (

                    {c.user} · {new Date(c.time).toLocaleString("zh-CN")}

          <div style={{ marginTop:20, display:"flex", gap:8, flexWrap:"wrap" }}>

                style={{ padding:"10px 20px", borderRadius:10, border:"none", background:`linear-gradient(135deg, ${pillarColor}, ${pillarAccent})`, color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer" }}

          {/* Comment Input */}

              />
              <button onClick={() => { if(commentText.trim()) { onAddComment(task.id, commentText.trim(), "comment"); setCommentText(""); setShowCommentBox(false); }}}

            </div>
          )}

          {/* Content Input */}
          {showContentBox && (
            <div style={{ marginTop:12 }}>
              <textarea value={contentText} onChange={e => setContentText(e.target.value)}
                placeholder="补充具体的执行策略、方法、学习心得..."
                style={{ width:"100%", minHeight:120, padding:12, borderRadius:10, border:`1px solid ${pillarAccent}40`, background: pillarAccent + "08", color:"#fff", fontSize:14, resize:"vertical", outline:"none", boxSizing:"border-box" }}
              />
              <button onClick={() => { if(contentText.trim()) { onAddContent(task.id, contentText.trim(), "content"); setContentText(""); setShowContentBox(false); }}}

                提交补充内容

            </div>

        </div>
      )}
    </div>
  );
}

function App() {
  const [userName, setUserName] = useState(null);
  const [claims, setClaims] = useState({});
  const [comments, setComments] = useState([]);
  const [activeSection, setActiveSection] = useState("hero");
  const [loaded, setLoaded] = useState(false);
  const containerRef = useRef(null);

  useEffect(() => {
    (async () => {
      const c = await loadState(STORAGE_KEY, {});
      const cm = await loadState(COMMENTS_KEY, []);
      setClaims(c);
      setComments(cm);
      setLoaded(true);
    })();
  }, []);

  const handleClaim = useCallback(async (id) => {
    const fresh = await loadState(STORAGE_KEY, {});
    if (fresh[id]) { setClaims(fresh); alert("该任务已被其他人领取！"); return; }
    const updated = { ...fresh, [id]: { user: userName, time: Date.now() } };
    // If claiming a pillar, also claim all its tasks
    const pillar = PILLARS.find(p => p.id === id);
    if (pillar) {
      pillar.tasks.forEach(t => {
        if (!updated[t.id]) updated[t.id] = { user: userName, time: Date.now() };
      });
    }
    await saveState(STORAGE_KEY, updated);
    setClaims(updated);
  }, [userName]);

  const handleAddComment = useCallback(async (taskId, text, type) => {
    const fresh = await loadState(COMMENTS_KEY, []);
    const entry = { taskId, user: userName, text, type, time: Date.now() };
    const updated = [...fresh, entry];
    await saveState(COMMENTS_KEY, updated);
    setComments(updated);
  }, [userName]);

  const sections = ["hero", "exec", "diagnosis", "pillars", "timeline", "template", "kpi", "risks", "summary"];
  const sectionLabels = ["首页", "摘要", "诊断", "四大支柱", "路线图", "模板", "KPI", "风险", "清单"];

  if (!loaded) return <div style={{ minHeight:"100vh", background:"#0a0a1a", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>加载中...</div>;

  return (
    <div ref={containerRef} style={{ minHeight:"100vh", background:"#0a0a1a", color:"#fff", fontFamily:"'Inter',-apple-system,sans-serif", position:"relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

      {!userName && <NameModal onSubmit={setUserName} />}

          />
        ))}
      </div>

      {/* Header Bar */}
      {userName && (
        <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:90, background:"rgba(10,10,26,0.85)", backdropFilter:"blur(20px)", borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"10px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:20 }}>✈️</span>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600 }}>HopeGoo GEO</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:16, fontSize:13 }}>

                  <div style={{ fontSize:28, marginBottom:8 }}>{p.icon}</div>
                  <div style={{ fontSize:14, fontWeight:600, color:"#fff", marginBottom:4 }}>{p.title.replace("支柱","").replace(/[：:].*/,"")}</div>
                  <div style={{ fontSize:12, color: claimed ? p.accent : "rgba(255,255,255,0.4)" }}>
                    {claimed ? `✅ ${claims[p.id].user}` : "待领取"}
                  </div>
                </div>
              );
            })}
          </div>

          {PILLARS.map(pillar => (
            <PillarSection
              key={pillar.id}
              pillar={pillar}
              claims={claims}
              comments={comments}
              userName={userName}
              onClaimPillar={handleClaim}
              onClaimTask={handleClaim}
              onAddComment={handleAddComment}
            />
          ))}
        </section>

        {/* TIMELINE */}
        <section id="section-timeline" style={{ padding:"80px 0" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:32, margin:"0 0 32px", color:"#fff" }}>{EXTRA_SECTIONS.timeline.title}</h2>
          {EXTRA_SECTIONS.timeline.phases.map((phase, pi) => (
            <div key={pi} style={{ marginBottom:32, position:"relative", paddingLeft:28 }}>
              <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:`linear-gradient(180deg, ${phase.color}, transparent)`, borderRadius:2 }} />
              <div style={{ position:"absolute", left:-5, top:4, width:13, height:13, borderRadius:"50%", background: phase.color, border:"3px solid #0a0a1a" }} />
              <h3 style={{ fontSize:18, color: phase.color === "#0F4C81" ? "#3B82F6" : phase.color === "#0D6E3F" ? "#22C55E" : "#A78BFA", margin:"0 0 12px" }}>{phase.name}</h3>
              {phase.steps.map((step, si) => (
                <div key={si} style={{ fontSize:14, color:"rgba(255,255,255,0.6)", padding:"8px 0", paddingLeft:12, borderLeft:"1px solid rgba(255,255,255,0.05)", marginLeft:4, lineHeight:1.6 }}>
                  {step}
                </div>
              ))}
            </div>
          ))}
        </section>

        {/* TEMPLATE */}
        <section id="section-template" style={{ padding:"80px 0" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:32, margin:"0 0 8px", color:"#fff" }}>{EXTRA_SECTIONS.template.title}</h2>
          <p style={{ fontSize:16, color:"rgba(255,255,255,0.5)", margin:"0 0 32px" }}>{EXTRA_SECTIONS.template.subtitle}</p>

          {EXTRA_SECTIONS.template.items.map((item, i) => (
            <div key={i} style={{ marginBottom:16, padding:16, background:"rgba(139,92,246,0.06)", borderRadius:12, border:"1px solid rgba(139,92,246,0.15)" }}>
              <div style={{ fontSize:12, color:"#A78BFA", fontWeight:600, marginBottom:6, fontFamily:"'JetBrains Mono',monospace" }}>{item.label}</div>
              <div style={{ fontSize:14, color:"rgba(255,255,255,0.7)" }}>{item.value}</div>
            </div>
          ))}

          <div style={{ marginTop:24, marginBottom:24 }}>
            <div style={{ fontSize:14, fontWeight:600, color:"#A78BFA", marginBottom:8 }}>开篇段落（前40-60词）：</div>
            <div style={{ padding:20, background:"rgba(139,92,246,0.08)", borderRadius:12, border:"1px solid rgba(139,92,246,0.2)", fontSize:15, color:"rgba(255,255,255,0.75)", lineHeight:1.8, fontStyle:"italic" }}>
              {EXTRA_SECTIONS.template.openingParagraph}
            </div>
          </div>

          <div style={{ fontSize:16, fontWeight:600, color:"#fff", margin:"32px 0 16px" }}>FAQ模块示例：</div>
          {EXTRA_SECTIONS.template.faq.map((f, i) => (
            <div key={i} style={{ marginBottom:16, padding:20, background:"rgba(255,255,255,0.03)", borderRadius:12, border:"1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ fontSize:15, fontWeight:600, color:"#fff", marginBottom:8 }}>Q: {f.q}</div>
              <div style={{ fontSize:14, color:"rgba(255,255,255,0.6)", lineHeight:1.7 }}>A: {f.a}</div>
            </div>
          ))}
        </section>

        {/* KPI */}
        <section id="section-kpi" style={{ padding:"80px 0" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:32, margin:"0 0 32px", color:"#fff" }}>{EXTRA_SECTIONS.kpi.title}</h2>

          <div style={{ overflowX:"auto", marginBottom:32 }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14 }}>
              <thead>
                <tr>
                  {["KPI指标", "衡量方法", "目标值", "频率"].map(h => (
                    <th key={h} style={{ textAlign:"left", padding:"12px 16px", background:"rgba(59,130,246,0.12)", color:"#3B82F6", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.1)", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {EXTRA_SECTIONS.kpi.metrics.map((m, i) => (
                  <tr key={i}>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"#fff", fontWeight:600, whiteSpace:"nowrap" }}>{m.name}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.6)" }}>{m.method}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"#22C55E", whiteSpace:"nowrap" }}>{m.target}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.5)", whiteSpace:"nowrap" }}>{m.freq}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <h3 style={{ fontSize:18, color:"#3B82F6", margin:"0 0 16px" }}>手动审计流程（重要！）</h3>
          <p style={{ fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:16 }}>每月30日执行以下操作：</p>
          {EXTRA_SECTIONS.kpi.auditSteps.map((step, i) => (
            <div key={i} style={{ display:"flex", gap:12, marginBottom:10, alignItems:"flex-start" }}>
              <div style={{ width:24, height:24, borderRadius:6, background:"rgba(59,130,246,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#3B82F6", fontWeight:700, flexShrink:0 }}>{i+1}</div>
              <div style={{ fontSize:14, color:"rgba(255,255,255,0.6)", lineHeight:1.6 }}>{step}</div>
            </div>
          ))}
        </section>

        {/* RISKS */}
        <section id="section-risks" style={{ padding:"80px 0" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:32, margin:"0 0 32px", color:"#fff" }}>{EXTRA_SECTIONS.risks.title}</h2>
          {EXTRA_SECTIONS.risks.items.map((item, i) => (
            <div key={i} style={{ marginBottom:24, padding:24, background: i === 0 ? "rgba(239,68,68,0.06)" : "rgba(255,255,255,0.03)", borderRadius:16, border: i === 0 ? "1px solid rgba(239,68,68,0.2)" : "1px solid rgba(255,255,255,0.06)" }}>
              <h3 style={{ fontSize:18, color: i === 0 ? "#EF4444" : "#fff", margin:"0 0 12px" }}>{item.subtitle}</h3>
              <p style={{ fontSize:14, color:"rgba(255,255,255,0.6)", lineHeight:1.8, margin:"0 0 12px" }}>
                {item.content.split("**").map((part, j) =>
                  j % 2 === 1 ? <strong key={j} style={{ color: i === 0 ? "#EF4444" : "#F59E0B" }}>{part}</strong> : <span key={j}>{part}</span>
                )}
              </p>
              {item.actions && (
                <div style={{ marginTop:12 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#EF4444", marginBottom:8 }}>紧急行动：</div>
                  {item.actions.map((a, ai) => (
                    <div key={ai} style={{ fontSize:14, color:"rgba(255,255,255,0.6)", padding:"6px 0 6px 16px", borderLeft:"2px solid rgba(239,68,68,0.3)" }}>{a}</div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </section>

        {/* SUMMARY TABLE */}
        <section id="section-summary" style={{ padding:"80px 0 120px" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:32, margin:"0 0 32px", color:"#fff" }}>{EXTRA_SECTIONS.summary.title}</h2>
          <div style={{ overflowX:"auto", marginBottom:40 }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14 }}>
              <thead>
                <tr>
                  {["Step", "行动项", "所属支柱", "时间线"].map(h => (
                    <th key={h} style={{ textAlign:"left", padding:"12px 16px", background:"rgba(34,197,94,0.12)", color:"#22C55E", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.1)", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {EXTRA_SECTIONS.summary.steps.map((s, i) => (
                  <tr key={i}>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"#22C55E", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>{s.step}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"#fff" }}>{s.action}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.5)" }}>{s.pillar}</td>
                    <td style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.5)", whiteSpace:"nowrap" }}>{s.time}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ textAlign:"center", padding:"40px 24px", background:"linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08))", borderRadius:20, border:"1px solid rgba(59,130,246,0.15)" }}>
            <p style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:"#fff", margin:"0 0 12px", fontWeight:600 }}>
              Content is the new backlink. Citation is the new ranking.
            </p>
            <p style={{ fontSize:15, color:"rgba(255,255,255,0.45)", margin:0, lineHeight:1.6 }}>
              当AI成为新的「搜索入口」，被引用就是被搜到。<br/>
              HopeGoo的目标：从「无人知晓」到「AI主动推荐」。
            </p>
          </div>
        </section>

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
